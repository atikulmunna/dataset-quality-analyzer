name: deploy-aws

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA, tag, or branch to deploy; use an older SHA to roll back"
        required: true
        default: "main"
        type: string
      promote_production:
        description: "Request production approval after the dev smoke test passes"
        required: true
        default: false
        type: boolean

concurrency:
  group: dqa-aws-deployment
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    name: Test, build, and scan
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Checkout requested release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve immutable release SHA
        id: release
        shell: bash
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "Only commits in main's history may be deployed" >&2
            exit 1
          }
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m compileall -q dqa web_dashboard.py
          pytest -q
          python scripts/build_lambda.py
          python scripts/build_web.py --mode preview

      - name: Build, exercise, and scan worker image
        run: python scripts/container_smoke.py --scan

      - name: Preserve the exact scanned image
        run: |
          mkdir -p .ci
          docker save dqa-worker:local | gzip > .ci/dqa-worker.tar.gz

      - name: Upload scanned worker image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: worker-${{ steps.release.outputs.sha }}
          path: .ci/dqa-worker.tar.gz
          retention-days: 1
          if-no-files-found: error

  deploy-dev:
    name: Deploy and smoke dev
    needs: quality
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout immutable release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.quality.outputs.release_sha }}

      - name: Download scanned worker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: worker-${{ needs.quality.outputs.release_sha }}
          path: .ci

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Obtain short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy and smoke dev
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
        run: bash scripts/deploy_aws.sh dev "${{ needs.quality.outputs.release_sha }}"

  deploy-production:
    name: Approve, deploy, and smoke production
    if: ${{ inputs.promote_production }}
    needs: [quality, deploy-dev]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout immutable release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.quality.outputs.release_sha }}

      - name: Download scanned worker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: worker-${{ needs.quality.outputs.release_sha }}
          path: .ci

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Obtain short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy and smoke production
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
        run: bash scripts/deploy_aws.sh prod "${{ needs.quality.outputs.release_sha }}"
