AWSTemplateFormatVersion: "2010-09-09"
Description: Persistent, near-zero-cost Terraform state and GitHub Actions OIDC access for DQA.

Parameters:
  GitHubOwner:
    Type: String
    Default: atikulmunna
    AllowedPattern: "[A-Za-z0-9_.-]+"
  GitHubRepository:
    Type: String
    Default: dataset-quality-analyzer
    AllowedPattern: "[A-Za-z0-9_.-]+"
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ""
    Description: Reuse an account-level token.actions.githubusercontent.com provider when one already exists.

Conditions:
  CreateGitHubOidcProvider: !Equals [!Ref ExistingGitHubOidcProviderArn, ""]

Resources:
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub dqa-terraform-state-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldStateVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
              NewerNoncurrentVersions: 5
      Tags:
        - Key: Project
          Value: dqa
        - Key: Purpose
          Value: terraform-state

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: Project
          Value: dqa

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dqa-github-deploy
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOwner}/${GitHubRepository}:environment:development
                  - !Sub repo:${GitHubOwner}/${GitHubRepository}:environment:production
      Policies:
        - PolicyName: dqa-terraform-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: TerraformStateBucketList
                Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt TerraformStateBucket.Arn
              - Sid: TerraformStateObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub ${TerraformStateBucket.Arn}/dqa/terraform.tfstate*
                  - !Sub ${TerraformStateBucket.Arn}/dqa-workspaces/*/dqa/terraform.tfstate*
              - Sid: ReadAccount
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                  - ec2:Describe*
                  - iam:Get*
                  - iam:List*
                  - ecr:GetAuthorizationToken
                  - ecr:DescribeRepositories
                  - ecr:DescribeImages
                  - logs:DescribeLogGroups
                  - s3:ListAllMyBuckets
                Resource: "*"
              - Sid: ManageDqaIamRoles
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:PutRolePolicy
                  - iam:GetRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:ListRolePolicies
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:PassRole
                Resource: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/dqa-*
              - Sid: ManageScaleToZeroStack
                Effect: Allow
                Action:
                  - apigateway:*
                  - batch:*
                  - budgets:*
                  - cloudfront:*
                  - cognito-idp:*
                  - dynamodb:*
                  - ecr:*
                  - ec2:CreateInternetGateway
                  - ec2:CreateRoute
                  - ec2:CreateRouteTable
                  - ec2:CreateSecurityGroup
                  - ec2:CreateSubnet
                  - ec2:CreateTags
                  - ec2:CreateVpc
                  - ec2:DeleteInternetGateway
                  - ec2:DeleteRoute
                  - ec2:DeleteRouteTable
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteSubnet
                  - ec2:DeleteTags
                  - ec2:DeleteVpc
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:ModifySubnetAttribute
                  - ec2:ModifyVpcAttribute
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                  - lambda:*
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:ListTagsForResource
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:DeleteObject
                  - s3:GetAccelerateConfiguration
                  - s3:GetBucketAcl
                  - s3:GetBucketCORS
                  - s3:GetBucketLocation
                  - s3:GetBucketLogging
                  - s3:GetBucketNotification
                  - s3:GetBucketObjectLockConfiguration
                  - s3:GetBucketOwnershipControls
                  - s3:GetBucketPolicy
                  - s3:GetBucketPolicyStatus
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketRequestPayment
                  - s3:GetBucketTagging
                  - s3:GetBucketVersioning
                  - s3:GetBucketWebsite
                  - s3:GetEncryptionConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:GetObject
                  - s3:GetReplicationConfiguration
                  - s3:ListBucket
                  - s3:PutBucketCORS
                  - s3:PutBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:PutEncryptionConfiguration
                  - s3:PutLifecycleConfiguration
                  - sns:*
                Resource: "*"

Outputs:
  DeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
  StateBucketName:
    Value: !Ref TerraformStateBucket
  GitHubOidcProviderArn:
    Value: !If
      - CreateGitHubOidcProvider
      - !Ref GitHubOidcProvider
      - !Ref ExistingGitHubOidcProviderArn
